<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiocoStoria</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card-bg: #f7f5f0;
    --card-inner: #ffffff;
    --accent: #3a5a8c;
    --accent-light: #e8eef7;
    --text-main: #1a1a1a;
    --text-secondary: #5a5a5a;
    --text-tertiary: #777;
    --border: #d8d4c8;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .wrapper {
    width: 100%;
    max-width: 400px;
  }
  .card-outer {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 1.25rem;
  }
  .card-inner {
    background: var(--card-inner);
    border-radius: calc(var(--radius) - 4px);
    border: 0.5px solid var(--border);
    padding: 1.25rem;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .streak { color: var(--accent); font-weight: 700; }
  .guide-text {
    font-size: 13px;
    color: var(--accent);
    font-style: italic;
    margin-bottom: 0.75rem;
    line-height: 1.5;
    font-weight: 500;
  }
  .dilemma-text {
    font-size: 15px;
    line-height: 1.6;
    margin: 0 0 1rem;
    color: var(--text-main);
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 0.75rem;
  }
  button.option-btn {
    padding: 12px;
    font-size: 14px;
    border: 1px solid var(--border);
    background: var(--accent-light);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s;
    color: var(--text-main);
    font-weight: 500;
    line-height: 1.4;
  }
  button.option-btn:hover { background: #d9e4f5; }
  button.option-btn:active { transform: scale(0.99); }

  .comment-box {
    background: var(--accent-light);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 1rem;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.5;
    font-weight: 500;
  }

  .profile-section { border-top: 0.5px solid var(--border); padding-top: 1rem; margin-bottom: 1rem; }
  .profile-label { font-size: 12px; color: var(--text-secondary); margin: 0 0 10px; }
  .axis { margin-bottom: 12px; }
  .axis-labels { display:flex; justify-content: space-between; font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
  .axis-bar { height: 8px; background: var(--accent-light); border-radius: 99px; position: relative; }
  .axis-tick { position:absolute; left:50%; top:50%; transform: translate(-50%,-50%); width:1px; height:14px; background: var(--border); }
  .axis-dot { position:absolute; top:-3px; width:14px; height:14px; border-radius:50%; background: var(--accent); transform: translateX(-50%); transition: left 0.3s; }

  .archetype-box {
    background: var(--accent-light);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .archetype-title { margin:0; font-size: 13px; font-weight: 600; color: var(--accent); }
  .archetype-sub { margin: 4px 0 0; font-size: 11px; color: var(--text-tertiary); }

  .footer-row {
    border-top: 0.5px solid var(--border);
    padding-top: 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .serial-label { margin:0; font-size: 11px; color: var(--text-tertiary); }
  .serial-code { margin:0; font-size: 13px; font-weight: 600; font-family: 'SF Mono', Consolas, monospace; word-break: break-all; }
  button.small-btn {
    padding: 8px 12px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: var(--card-inner);
    border-radius: 8px;
    cursor: pointer;
    white-space: nowrap;
  }

  .restore-section {
    margin-top: 1rem;
    text-align: center;
  }
  .restore-section input {
    width: 100%;
    padding: 8px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
    font-family: monospace;
    box-sizing: border-box;
  }
  .restore-section button {
    width: 100%;
    padding: 10px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--accent-light);
    cursor: pointer;
  }
  .link-btn {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    padding: 4px;
    margin-top: 8px;
  }

  .final-card {
    text-align: center;
  }
  .final-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin: 0.5rem 0;
  }
  .final-text {
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 1rem;
  }

  /* Replay overlay */
  .replay-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .replay-box {
    background: var(--card-inner);
    border-radius: var(--radius);
    padding: 1.5rem;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  .replay-box .day-num { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
  .replay-box .text { font-size: 15px; line-height: 1.7; margin: 0.75rem 0; color: var(--text-main); }
  .replay-box .choice { font-size: 14px; color: var(--accent); font-weight: 700; }
  .replay-box .progress { height:4px; background: var(--accent-light); border-radius:99px; margin-top:1rem; overflow:hidden; }
  .replay-box .progress-fill { height:100%; background: var(--accent); transition: width 0.3s; }
  .replay-close {
    margin-top: 1rem;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--accent-light);
    cursor: pointer;
    font-size: 13px;
  }
  .replay-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1rem;
    gap: 8px;
  }
  .replay-arrow {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--accent-light);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-weight: 700;
  }
  .replay-arrow:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .replay-arrow:active:not(:disabled) { transform: scale(0.95); }

  /* Intro card */
  .intro-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    margin: 0 0 0.75rem;
    text-align: center;
  }
  .intro-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-main);
    margin-bottom: 0.75rem;
  }
  .intro-list {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-main);
    margin: 0 0 1rem;
    padding-left: 1.2rem;
  }
  .intro-list li { margin-bottom: 4px; }

  .name-input-row {
    margin-bottom: 1rem;
  }
  .name-input-row label {
    display: block;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .name-input-row input {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-sizing: border-box;
    font-family: inherit;
  }

  button.primary-btn {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    cursor: pointer;
  }
  button.primary-btn:active { opacity: 0.9; }

  /* Copia seriale */
  .serial-code-wrap {
    cursor: pointer;
    position: relative;
  }
  .copy-feedback {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin: 2px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .copy-feedback.show { opacity: 1; }

  /* Badge compagno/percorso */
  .companion-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 99px;
    font-weight: 700;
  }

  /* Tasto ricomincia in alto */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 6px;
  }
  .restart-top-btn {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 11px;
    cursor: pointer;
    text-decoration: underline;
    padding: 2px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="top-bar" id="topBar" style="display:none;">
    <button class="restart-top-btn" id="restartTopBtn">Ricomincia da capo</button>
  </div>
  <div class="card-outer">
    <div class="card-inner" id="gameCard">
      <!-- popolato via JS -->
    </div>
  </div>

  <div class="restore-section" id="restoreSection">
    <button class="link-btn" id="toggleRestore">Hai un seriale? Inseriscilo per ripristinare il tuo percorso</button>
    <div id="restoreForm" style="display:none; margin-top:8px;">
      <input type="text" id="serialInput" placeholder="TS-XXXX-XXXXX">
      <button id="restoreBtn">Ripristina percorso</button>
    </div>
  </div>
</div>
